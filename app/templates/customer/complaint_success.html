{% extends "base.html" %}

{% block title %}Complaint Filed - ReviewAI{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto py-12 px-4 text-center">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-12 lg:p-16">
        <div
            class="w-20 h-20 rounded-full bg-red-100 text-red-600 flex items-center justify-center mx-auto mb-8 animate-pulse">
            <svg class="w-10 h-10 outline-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M12 9v6m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
        </div>

        <h1 class="text-3xl font-black text-gray-900 mb-4">{{ message }}</h1>
        <p class="text-gray-500 mb-10 leading-relaxed">
            Your complaint has been logged with our moderation team.
            You will be notified once a decision has been made.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{{ url_for('customer.dashboard') }}"
                class="px-8 py-4 bg-gray-900 text-white font-bold rounded-2xl hover:bg-teal-600 transition-all shadow-lg hover:shadow-2xl transform hover:-translate-y-1">
                Return to Dashboard
            </a>
            <button onclick="window.history.back()"
                class="px-8 py-4 bg-white text-gray-700 border border-gray-200 font-bold rounded-2xl hover:bg-gray-50 transition-all">
                Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
