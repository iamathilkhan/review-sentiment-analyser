{% extends "base.html" %}

{% block title %}Register - ReviewAI{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
    <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100" x-data="registerForm()">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Create Account</h1>
            <p class="text-gray-500">Join the next generation of review intelligence</p>
        </div>

        <div x-show="serverError" x-transition class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm">
            <p x-text="serverError"></p>
        </div>

        <form @submit.prevent="submitForm" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div>
                <label for="name" class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                <input type="text" id="name" x-model="formData.name" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200"
                    :class="{'border-red-500': errors.name}"
                    placeholder="John Doe">
                <p x-show="errors.name" class="text-red-500 text-xs mt-1" x-text="errors.name"></p>
            </div>

            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" x-model="formData.email" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200"
                    :class="{'border-red-500': errors.email}"
                    placeholder="john@example.com">
                <p x-show="errors.email" class="text-red-500 text-xs mt-1" x-text="errors.email"></p>
            </div>

            <div>
                <label for="role" class="block text-sm font-semibold text-gray-700 mb-1">I am a...</label>
                <select id="role" x-model="formData.role"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200">
                    <option value="customer">Customer (Browsing Reviews)</option>
                    <option value="seller">Seller (Managing Products)</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" x-model="formData.password"
                        @input="checkPasswords"
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200"
                        :class="{'border-red-500': errors.password}"
                        placeholder="••••••••">
                </div>
                <div>
                    <label for="confirm_password" class="block text-sm font-semibold text-gray-700 mb-1">Confirm</label>
                    <input type="password" id="confirm_password" x-model="formData.confirm_password"
                        @input="checkPasswords"
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200"
                        :class="{'border-red-500': errors.confirm_password}"
                        placeholder="••••••••">
                </div>
            </div>
            <p x-show="errors.password" class="text-red-500 text-xs mt-1" x-text="errors.password"></p>
            <p x-show="errors.confirm_password" class="text-red-500 text-xs mt-1" x-text="errors.confirm_password"></p>

            <div class="pt-2">
                <button type="submit" 
                    class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition duration-300 flex justify-center items-center"
                    :disabled="loading">
                    <template x-if="loading">
                        <svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </template>
                    <span x-text="loading ? 'Creating Account...' : 'Create Account'"></span>
                </button>
            </div>
        </form>

        <div class="mt-6 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-600">
                Already have an account? 
                <a href="{{ url_for('auth.login') }}" class="font-bold text-teal-600 hover:text-teal-500">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script>
    function registerForm() {
        return {
            formData: {
                name: '',
                email: '',
                password: '',
                confirm_password: '',
                role: 'customer'
            },
            errors: {},
            serverError: '',
            loading: false,
            checkPasswords() {
                this.errors.confirm_password = '';
                if (this.formData.confirm_password && this.formData.password !== this.formData.confirm_password) {
                    this.errors.confirm_password = 'Passwords do not match';
                }
            },
            submitForm() {
                this.errors = {};
                this.serverError = '';
                
                if (!this.formData.name) this.errors.name = 'Name is required';
                if (!this.formData.email) this.errors.email = 'Email is required';
                if (!this.formData.password) this.errors.password = 'Password is required';
                if (this.formData.password !== this.formData.confirm_password) {
                    this.errors.confirm_password = 'Passwords do not match';
                }
                
                if (Object.keys(this.errors).length > 0) return;
                
                this.loading = true;
                
                authService.register(this.formData)
                    .then(data => {
                        window.location.href = '/dashboard';
                    })
                    .catch(err => {
                        this.serverError = err.message || 'Registration failed. Please try again.';
                    })
                    .finally(() => {
                        this.loading = false;
                    });
            }
        }
    }
</script>
{% endblock %}
