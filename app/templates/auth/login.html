{% extends "base.html" %}

{% block title %}Login - ReviewAI{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100" x-data="loginForm()">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h1>
            <p class="text-gray-500">Sign in to manage your reviews and insights</p>
        </div>

        <div x-show="error" x-transition class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm">
            <p x-text="error"></p>
        </div>

        <form @submit.prevent="submitForm" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                <input type="email" id="email" x-model="formData.email" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200"
                    :class="{'border-red-500': errors.email}"
                    placeholder="name@company.com">
                <p x-show="errors.email" class="text-red-500 text-xs mt-1" x-text="errors.email"></p>
            </div>

            <div>
                <div class="flex justify-between mb-2">
                    <label for="password" class="block text-sm font-semibold text-gray-700">Password</label>
                    <a href="#" class="text-sm font-medium text-teal-600 hover:text-teal-500">Forgot password?</a>
                </div>
                <input type="password" id="password" x-model="formData.password"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-teal-500 focus:border-transparent transition duration-200"
                    :class="{'border-red-500': errors.password}"
                    placeholder="••••••••">
                <p x-show="errors.password" class="text-red-500 text-xs mt-1" x-text="errors.password"></p>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember" x-model="formData.remember"
                    class="h-4 w-4 text-teal-600 focus:ring-teal-500 border-gray-300 rounded">
                <label for="remember" class="ml-2 block text-sm text-gray-700">Remember me</label>
            </div>

            <button type="submit" 
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition duration-300 flex justify-center items-center"
                :disabled="loading">
                <template x-if="loading">
                    <svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </template>
                <span x-text="loading ? 'Signing in...' : 'Sign In'"></span>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-600">
                Don't have an account? 
                <a href="{{ url_for('auth.register') }}" class="font-bold text-teal-600 hover:text-teal-500">Create an account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script>
    function loginForm() {
        return {
            formData: {
                email: '',
                password: '',
                remember: false
            },
            errors: {},
            error: '',
            loading: false,
            submitForm() {
                this.errors = {};
                this.error = '';
                
                if (!this.formData.email) this.errors.email = 'Email is required';
                if (!this.formData.password) this.errors.password = 'Password is required';
                
                if (Object.keys(this.errors).length > 0) return;
                
                this.loading = true;
                
                authService.login(this.formData)
                    .then(data => {
                        window.location.href = data.redirect || '/';
                    })
                    .catch(err => {
                        this.error = err.message || 'Invalid credentials. Please try again.';
                    })
                    .finally(() => {
                        this.loading = false;
                    });
            }
        }
    }
</script>
{% endblock %}
