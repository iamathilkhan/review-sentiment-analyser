{% macro review_form(product_id) %}
<div class="review-submission-container" id="review-container-{{ product_id }}">
    <form id="review-form-{{ product_id }}" class="review-form" data-product-id="{{ product_id }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="form-group mb-3">
            <label for="review-content" class="form-label">Write your review</label>
            <textarea 
                id="review-content" 
                name="content" 
                class="form-control" 
                rows="5" 
                placeholder="Share your experience (min 20, max 2000 characters)"
                required
                minlength="20"
                maxlength="2000"
            ></textarea>
            
            <!-- Emotion Detector Area -->
            <div id="emotion-suggester" class="mt-2 d-none">
                <span class="text-sm font-semibold text-teal-600 mb-1 d-block"><i class="bi bi-magic"></i> Detected Emotions (Click to confirm)</span>
                <div id="emotion-pills" class="d-flex flex-wrap gap-2"></div>
                <input type="hidden" name="confirmed_emotions" id="confirmed_emotions" value="[]">
            </div>

            <div class="form-text d-flex justify-content-between mt-2">

                <span id="char-count-msg" class="text-muted">Minimum 20 characters required.</span>
                <span id="char-counter"><span id="current-count">0</span> / 2000</span>
            </div>
        </div>

        <button type="submit" id="submit-review-btn" class="btn btn-primary w-100" disabled>
            Submit Review for Analysis
        </button>
    </form>

    <!-- Loading Overlay -->
    <div id="review-loading" class="review-overlay d-none">
        <div class="text-center p-4">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <h5 id="processing-status-text">Analysing your review...</h5>
            <p class="text-muted">We're identifying aspects like quality, battery life, and more.</p>
        </div>
    </div>

    <!-- Results Container -->
    <div id="review-result" class="review-result-container d-none">
        <!-- Result content will be injected here via JS/Partial -->
    </div>
</div>

<script src="{{ url_for('static', filename='js/review_submit.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const textarea = document.getElementById('review-content');
        const emotionContainer = document.getElementById('emotion-suggester');
        const emotionPills = document.getElementById('emotion-pills');
        let debounceTimer;
        let confirmedEmotions = new Set(); // Store user confirmations

        textarea.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            const text = this.value;
            
            if (text.length > 5) {
                debounceTimer = setTimeout(() => predictEmotions(text), 500);
            } else {
                emotionContainer.classList.add('d-none');
            }
        });

        async function predictEmotions(text) {
            try {
                const response = await fetch('/customer/predict_emotion', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('input[name="csrf_token"]').value
                    },
                    body: JSON.stringify({text: text})
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.emotions && data.emotions.length > 0) {
                        // Only add newly predicted emotions that aren't already confirmed
                        renderEmotions(data.emotions);
                        emotionContainer.classList.remove('d-none');
                    } else if (confirmedEmotions.size === 0) {
                        emotionContainer.classList.add('d-none');
                    }
                }
            } catch (err) {
                console.error("Emotion prediction failed:", err);
            }
        }

        function renderEmotions(emotions) {
            // Keep existing confirmed pills, clear others
            const existingConfirmed = Array.from(emotionPills.children)
                .filter(btn => btn.classList.contains('bg-teal-600'))
                .map(btn => btn.dataset.emotion);
                
            emotionPills.innerHTML = '';
            
            // Render all unique emotions (predicted + confirmed)
            const allEmotions = new Set([...emotions, ...existingConfirmed, ...confirmedEmotions]);
            
            allEmotions.forEach(emotion => {
                const isConfirmed = confirmedEmotions.has(emotion);
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.dataset.emotion = emotion;
                
                if (isConfirmed) {
                    btn.className = 'badge rounded-pill bg-teal-600 text-white border hover:-translate-y-1 transition shadow-sm';
                    btn.innerHTML = `<i class="bi bi-check-circle-fill me-1"></i> ${emotion}`;
                } else {
                    btn.className = 'badge rounded-pill bg-light text-dark border hover:-translate-y-1 transition';
                    btn.textContent = emotion;
                }
                
                btn.style.cursor = 'pointer';
                btn.onclick = () => toggleConfirmEmotion(emotion);
                emotionPills.appendChild(btn);
            });
        }

        function toggleConfirmEmotion(emotion) {
            if (confirmedEmotions.has(emotion)) {
                confirmedEmotions.delete(emotion);
            } else {
                confirmedEmotions.add(emotion);
                // Optional UI feedback
                if (window.showToast) {
                    showToast("Emotion confirmed! This helps train our AI.", "success");
                }
            }
            // Update hidden input
            document.getElementById('confirmed_emotions').value = JSON.stringify(Array.from(confirmedEmotions));
            // Re-render pills
            const currentPills = Array.from(emotionPills.children).map(btn => btn.dataset.emotion);
            renderEmotions(currentPills);
        }
    });
</script>
<style>
    .review-overlay {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 8px;
        border: 1px solid #dee2e6;
        margin-top: 1rem;
    }
    .review-result-container {
        margin-top: 1.5rem;
        padding: 1.5rem;
        border-radius: 8px;
        background: #f8f9fa;
        border-left: 5px solid #0d6efd;
    }
</style>
{% endmacro %}
