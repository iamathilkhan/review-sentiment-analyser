<div class="space-y-6" x-show="activeTab === 'complaints'" x-cloak>
    <div class="bg-white border-b border-gray-100 py-6 sticky top-16 z-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h2 class="text-2xl font-bold text-gray-900">Complaint Inbox</h2>
            <div class="flex items-center space-x-3">
                <select x-model="complaintFilterStatus" class="rounded-xl border border-gray-200 text-sm font-semibold py-2 px-4 focus:ring-2 focus:ring-teal-500 shadow-sm transition-all focus:border-teal-500 text-gray-700">
                    <option value="all">All Status</option>
                    <option value="open">Pending Review</option>
                    <option value="in_progress">Resolving</option>
                    <option value="resolved">Resolved Case</option>
                </select>
                <select x-model="complaintFilterSeverity" class="rounded-xl border border-gray-200 text-sm font-semibold py-2 px-4 focus:ring-2 focus:ring-teal-500 shadow-sm transition-all focus:border-teal-500 text-gray-700">
                    <option value="all">All Severities</option>
                    <option value="critical">Critical Only</option>
                    <option value="high">High Stress</option>
                    <option value="medium">Medium Priority</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Complaint Table -->
    <div class="flex flex-col">
        <div class="-my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
            <div class="py-2 align-middle inline-block min-w-full sm:px-6 lg:px-8">
                <div class="shadow-sm overflow-hidden border border-gray-100 rounded-2xl bg-white">
                    <table class="min-w-full divide-y divide-gray-100">
                        <thead class="bg-gray-50/50">
                            <tr>
                                <th class="px-6 py-4 text-left text-[10px] font-bold text-gray-400 uppercase tracking-widest">Product & Date</th>
                                <th class="px-6 py-4 text-left text-[10px] font-bold text-gray-400 uppercase tracking-widest">Severity</th>
                                <th class="px-6 py-4 text-left text-[10px] font-bold text-gray-400 uppercase tracking-widest">Issue Excerpt</th>
                                <th class="px-6 py-4 text-left text-[10px] font-bold text-gray-400 uppercase tracking-widest">Status / Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-50">
                            <template x-for="complaint in filteredComplaints" :key="complaint.id">
                                <tr class="hover:bg-gray-100/30 transition-colors group">
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <div class="text-sm font-bold text-gray-900" x-text="complaint.product_name"></div>
                                        <div class="text-xs font-semibold text-gray-400" x-text="new Date(complaint.created_at).toLocaleDateString()"></div>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span 
                                            :class="{
                                                'bg-red-50 text-red-700 border-red-100': complaint.severity === 'critical',
                                                'bg-orange-50 text-orange-700 border-orange-100': complaint.severity === 'high',
                                                'bg-amber-50 text-amber-700 border-amber-100': complaint.severity === 'medium',
                                                'bg-gray-100 text-gray-600 border-gray-200': complaint.severity === 'low'
                                            }"
                                            class="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider border shadow-sm"
                                            x-text="complaint.severity"
                                        ></span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="text-sm text-gray-600 line-clamp-2 max-w-md font-medium italic" x-text="'&ldquo;' + complaint.review_excerpt + '&rdquo;'"></div>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <select 
                                            @change="updateComplaintStatus(complaint.id, $event.target.value)"
                                            :class="{
                                                'bg-red-50 text-red-600 border-red-200 focus:ring-red-500': complaint.status === 'open',
                                                'bg-amber-50 text-amber-600 border-amber-200 focus:ring-amber-500': complaint.status === 'in_progress',
                                                'bg-teal-50 text-teal-600 border-teal-200 focus:ring-teal-500': complaint.status === 'resolved'
                                            }"
                                            class="block w-full border text-[11px] font-bold py-1.5 px-3 rounded-xl transition-all shadow-sm focus:ring-offset-2 appearance-none cursor-pointer pr-8"
                                            x-model="complaint.status"
                                        >
                                            <option value="open">PENDING</option>
                                            <option value="in_progress">IN PROGRESS</option>
                                            <option value="resolved">RESOLVED</option>
                                            <option value="closed">CLOSED</option>
                                        </select>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>

                    <div x-show="filteredComplaints.length === 0" class="py-24 text-center">
                         <div class="text-4xl mb-4">🎉</div>
                         <h3 class="text-lg font-bold text-gray-900 mb-1">Clear Horizon!</h3>
                         <p class="text-gray-500 font-medium">No open complaints matching these filters — great work!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
